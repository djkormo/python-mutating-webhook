apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: init-injector-webhook
webhooks:
- name: init-injector.example.com
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: 10
  failurePolicy: Fail #Ignore  # Use Fail in prod
  matchPolicy: Equivalent
  rules:
  - operations: ["CREATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
    scope: "Namespaced"
  clientConfig:
    service:
      name: init-injector
      namespace: webhook-system
      path: "/mutate"
      port: 443
    caBundle:  #Cg==  #${CA_BUNDLE}  # Paste the base64 value here
  objectSelector:
    matchLabels:
      init-inject: "true"  # ← Only pods with this label!
  #namespaceSelector:
  #  matchExpressions:
  #  - key: init-injection
  #    operator: In
  #    values: ["enabled"]
